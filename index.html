<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Treino ABCD">
    <link rel="apple-touch-icon" href="./appicon.png">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
    <title>Treino ABCD - Lombar Sensível</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body class="min-h-screen pb-20">

    <!-- Header & Theme Toggle -->
    <header
        class="p-4 flex justify-between items-center bg-white dark:bg-slate-900 shadow-sm sticky top-0 z-50 transition-colors">
        <h1 class="text-xl font-bold">Lombar <span class="text-blue-500">Sensível</span></h1>
        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800">
            <svg id="sunIcon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20">
                <path
                    d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z">
                </path>
            </svg>
            <svg id="moonIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- Regras e Aquecimento -->
        <div class="card p-4 rounded-xl mb-6 border border-slate-200 dark:border-slate-700 shadow-sm">
            <h2 class="font-bold mb-2 flex items-center gap-2">
                <span>⚠️</span> Regras Gerais
            </h2>
            <ul class="text-sm space-y-1 opacity-80">
                <li>• Aquecimento: 5-10 min caminhada/bike.</li>
                <li>• Descanso: 45s a 90s.</li>
                <li>• Carga limpa, sem prender a respiração.</li>
                <li>• Não ir até a falha nas primeiras semanas.</li>
            </ul>
        </div>

        <!-- Seletor de Dias -->
        <div class="flex overflow-x-auto gap-2 mb-6 no-scrollbar py-2">
            <button onclick="changeDay(1)" data-day="1"
                class="day-btn px-4 py-2 rounded-full whitespace-nowrap bg-gray-200 dark:bg-slate-800 text-sm font-semibold">SEG
                - A</button>
            <button onclick="changeDay(2)" data-day="2"
                class="day-btn px-4 py-2 rounded-full whitespace-nowrap bg-gray-200 dark:bg-slate-800 text-sm font-semibold">TER
                - B</button>
            <button onclick="changeDay(4)" data-day="4"
                class="day-btn px-4 py-2 rounded-full whitespace-nowrap bg-gray-200 dark:bg-slate-800 text-sm font-semibold">QUI
                - C</button>
            <button onclick="changeDay(5)" data-day="5"
                class="day-btn px-4 py-2 rounded-full whitespace-nowrap bg-gray-200 dark:bg-slate-800 text-sm font-semibold">SEX
                - D</button>
            <button onclick="changeDay(0)" data-day="0"
                class="day-btn px-4 py-2 rounded-full whitespace-nowrap bg-gray-200 dark:bg-slate-800 text-sm font-semibold">OUTROS</button>
        </div>

        <!-- Container de Treino -->
        <div id="workoutTitle" class="mb-4">
            <h2 class="text-2xl font-bold" id="dayLabel">Treino de Hoje</h2>
            <p id="muscleGroup" class="text-blue-500 font-semibold"></p>
        </div>

        <div id="exercisesList" class="space-y-4">
            <!-- Exercícios serão injetados aqui via JS -->
        </div>

        <!-- Mensagem de Descanso -->
        <div id="restMessage" class="hidden mt-8 text-center p-8">
            <p class="text-xl opacity-50">Hoje é dia de descanso! Recuperação é parte do treino. 🧘‍♂️</p>
        </div>
    </main>

    <!-- Som de Alerta (Beep) -->
    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script src="./script.js"></script>
</body>

</html>
